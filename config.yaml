# ============================================================
# Flight Deal Monitor — Configuration
# ============================================================

# --- Feed sources -------------------------------------------------
# Add/remove feeds freely. Most travel-deal blogs run WordPress,
# so "siteurl.com/feed/" almost always works even if not listed here.
feeds:
  - name: "TravelFree"
    url: "https://travelfree.info/feed/"
  - name: "Secret Flying (Europe deals)"
    url: "https://www.secretflying.com/euro-deals/feed/"
  - name: "Secret Flying (Error Fares)"
    url: "https://www.secretflying.com/error-fares/feed/"
  - name: "Fly4Free"
    url: "https://www.fly4free.com/feed/"
  - name: "Fly4Free (Error Fares)"
    url: "https://www.fly4free.com/flight-deals/error-fare/feed/"
  - name: "Travel-Dealz"
    url: "https://www.travel-dealz.com/feed/"
  - name: "Thrifty Traveler"
    url: "https://thriftytraveler.com/feed/"
  - name: "Fare Deal Alert"
    url: "https://www.faredealalert.com/feed/"
  - name: "The Flight Deal (all)"
    url: "https://www.theflightdeal.com/feed/"
  # Add your specific home airport(s) here if you want, e.g.:
  # - name: "The Flight Deal (LHR/LGW/STN)"
  #   url: "https://www.theflightdeal.com/category/flight-deals/lon/feed/"

# --- Keyword filters ------------------------------------------------
# "Error fare" language — used by the hot-deal rule below regardless of price.
error_fare_keywords:
  - "error fare"
  - "mistake fare"
  - "glitch"
  - "fuel dump"
  - "pricing error"
  - "fare error"

# --- Two-tier matching rule -----------------------------------------
# A post is flagged if EITHER of these is true:
#
#   Tier 1 (priority routes): departs from one of your priority
#     airports/cities AND the price is at or under price_max_normal_eur.
#
#   Tier 2 (hot deals, any European origin): departs from ANYWHERE in
#     Europe AND (it's an error/mistake fare OR the price is at or
#     under price_max_hot_eur) — regardless of departure city.
#
# Price is extracted from the post title/summary text (deal blogs
# almost always state it there, e.g. "for only €300"). If no price can
# be found, Tier 1 never matches (price is required); Tier 2 can still
# match on error-fare language alone even with no price found.

price_max_normal_eur: 550
price_max_hot_eur: 350

# Priority departure airports/cities — edit freely to match your
# actual home airports. Matching is case-insensitive substring
# matching against the post title + summary.
origin_priority_keywords:
  - "Vilnius"
  - "VNO"
  - "Riga"
  - "RIX"
  - "Warsaw"
  - "WAW"
  - "WMI"       # Warsaw Modlin (budget carrier alternate airport)
  - "Copenhagen"
  - "CPH"
  - "Stockholm"
  - "ARN"
  - "Milan"
  - "Milano"
  - "MXP"       # Malpensa
  - "LIN"       # Linate
  - "BGY"       # Bergamo/Orio al Serio (budget carrier alternate airport)

# Broader "anywhere in Europe" list, used only for Tier 2 (hot deals).
# This intentionally covers a lot more cities than your priority list,
# since Tier 2 exists specifically to catch great deals you'd still
# want to know about even from an airport you don't usually fly from.
origin_europe_keywords:
  - "Europe"
  - "European"
  - "London"
  - "Paris"
  - "Berlin"
  - "Frankfurt"
  - "Munich"
  - "Amsterdam"
  - "Madrid"
  - "Barcelona"
  - "Rome"
  - "Vienna"
  - "Zurich"
  - "Brussels"
  - "Oslo"
  - "Helsinki"
  - "Prague"
  - "Budapest"
  - "Lisbon"
  - "Dublin"
  - "Athens"
  - "Tallinn"
  - "from Germany"
  - "from France"
  - "from Spain"
  - "from Italy"
  - "from Poland"
  - "from the UK"
  - "LHR"
  - "LGW"
  - "CDG"
  - "FRA"
  - "MUC"
  - "AMS"
  - "MAD"
  - "BCN"
  - "FCO"
  - "VIE"
  - "ZRH"
  # Also include the priority list, so Tier 2 matches from those
  # cities too (e.g. a cheap error fare from Vilnius should still
  # flag under Tier 2, not just Tier 1):
  - "Vilnius"
  - "VNO"
  - "Riga"
  - "RIX"
  - "Warsaw"
  - "WAW"
  - "Copenhagen"
  - "CPH"
  - "Stockholm"
  - "ARN"
  - "Milan"
  - "Milano"
  - "MXP"

destination_keywords: []
  # - "Tokyo"
  # - "Bali"

# Approximate conversion rates TO EUR, used when a post's price is
# listed in a different currency (e.g. "£570", "$400"). These are
# rough and will drift over time — update periodically, or treat
# price filtering as approximate rather than exact.
currency_to_eur_rates:
  EUR: 1.0
  GBP: 1.17
  USD: 0.92
  PLN: 0.23
  SEK: 0.087   # also used as a rough stand-in for DKK/NOK ("kr")

# --- Polling ----------------------------------------------------
poll_interval_minutes: 15

# --- Notifications ------------------------------------------------
# Enable one or more channels. Fill in credentials via environment
# variables (recommended) or directly here.
notifications:
  console: true          # always-on fallback, prints to stdout

  telegram:
    enabled: false
    bot_token_env: "TELEGRAM_BOT_TOKEN"
    chat_id_env: "TELEGRAM_CHAT_ID"

  discord:
    enabled: false
    webhook_url_env: "DISCORD_WEBHOOK_URL"

  email:
    enabled: true
    smtp_host: "smtp.gmail.com"   # change if using a different provider (see README)
    smtp_port: 587
    from_addr_env: "DEAL_MONITOR_EMAIL_FROM"
    password_env: "DEAL_MONITOR_EMAIL_PASSWORD"
    to_addr_env: "DEAL_MONITOR_EMAIL_TO"

# --- Storage --------------------------------------------------------
# When running locally this file lands next to the script. When running
# via Docker, docker-compose.yml mounts ./data as /app/data so this
# persists across container restarts/rebuilds.
seen_items_file: "data/seen_items.json"
